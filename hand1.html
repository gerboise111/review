<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Replayer Poker : Top Pair Battle (Kicker Trouble)</title>
    <style>
        :root { --bg: #0f0f0f; --table: #1a4a1a; --accent: #ffcc00; --player-bg: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .table-area { background: var(--table); width: 800px; height: 440px; border-radius: 200px; border: 10px solid #333; position: relative; box-shadow: inset 0 0 100px rgba(0,0,0,0.8); margin-bottom: 20px; }
        .pot-display { background: rgba(0,0,0,0.8); padding: 5px 20px; border-radius: 20px; color: var(--accent); font-weight: bold; position: absolute; top: 32%; left: 50%; transform: translateX(-50%); border: 1px solid var(--accent); z-index: 10; }

        .player { position: absolute; width: 110px; text-align: center; background: var(--player-bg); padding: 8px; border-radius: 8px; border: 2px solid #444; transition: all 0.2s; }
        .player.active-turn { border-color: var(--accent); box-shadow: 0 0 15px rgba(255,204,0,0.5); transform: scale(1.05); }
        .player-name { font-size: 0.75rem; font-weight: bold; color: #999; }
        .player-stack { font-size: 0.85rem; color: var(--accent); font-weight: bold; margin-top: 2px; }
        
        /* Configuration 6-Max */
        .p-utg { top: 40px; right: 50px; }
        .p-mp  { bottom: 80px; right: 40px; }
        .p-co  { bottom: -20px; left: 65%; transform: translateX(-50%); }
        .p-btn { bottom: -20px; left: 35%; transform: translateX(-50%); }
        .p-sb  { bottom: 80px; left: 40px; }
        .p-bb  { top: 40px; left: 50px; }

        .board { position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 8px; }
        .card { width: 48px; height: 70px; background: white; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 1.3rem; color: #111; visibility: hidden; }
        .card.visible { visibility: visible; }
        .hero-cards { display: flex; gap: 4px; justify-content: center; margin-top: 4px; }
        .small-card { width: 22px; height: 32px; background: white; border-radius: 3px; font-size: 0.7rem; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .c { color: #27ae60; } .d { color: #2980b9; } .h { color: #e74c3c; } .s { color: #111; }

        .bet { position: absolute; background: rgba(0,0,0,0.8); padding: 2px 12px; border-radius: 12px; font-size: 0.9rem; border: 1px solid #555; display: none; color: white; font-weight: bold; }
        .bet-sb  { bottom: 130px; left: 160px; }
        .bet-bb  { top: 120px; left: 170px; }

        .street-nav { display: flex; gap: 8px; margin-bottom: 15px; }
        .street-nav button { background: #1a1a1a; font-size: 0.7rem; padding: 6px 12px; border: 1px solid #444; color: #999; cursor: pointer; }
        .street-nav button:hover { background: var(--accent); color: black; }

        .main-nav { display: flex; gap: 15px; margin-bottom: 20px; }
        button { background: #222; color: white; border: 1px solid #555; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover:not(:disabled) { border-color: var(--accent); }
        button:disabled { opacity: 0.1; }

        .log { width: 620px; background: #181818; padding: 20px; border-radius: 10px; border-bottom: 4px solid var(--accent); text-align: center; font-size: 1.1rem; min-height: 1.5em; }
    </style>
</head>
<body>

    <div class="table-area">
        <div class="pot-display">POT: <span id="pot">0</span> bb</div>
        <div class="board" id="board">
            <div id="b0" class="card"></div><div id="b1" class="card"></div><div id="b2" class="card"></div>
            <div id="b3" class="card"></div><div id="b4" class="card"></div>
        </div>

        <div class="player p-utg"><div class="player-name">UTG</div><div class="player-stack">100 bb</div></div>
        <div class="player p-mp"><div class="player-name">MP</div><div class="player-stack">100 bb</div></div>
        <div class="player p-co"><div class="player-name">CO</div><div class="player-stack">100 bb</div></div>
        <div class="player p-btn"><div class="player-name">BTN</div><div class="player-stack">100 bb</div></div>
        <div class="player p-sb" id="player-sb">
            <div class="player-name">VILAIN (SB)</div>
            <div class="player-stack" id="stack-sb">122 bb</div>
        </div>
        <div class="player p-bb" id="player-bb">
            <div class="player-name">HERO (BB)</div>
            <div class="player-stack" id="stack-bb">100 bb</div>
            <div class="hero-cards" id="hero-cards"></div>
        </div>

        <div class="bet bet-sb" id="bet-sb"></div>
        <div class="bet bet-bb" id="bet-bb"></div>
    </div>

    <div class="street-nav">
        <button onclick="goToStreet('BLINDS')">BLINDS</button>
        <button onclick="goToStreet('PRE')">PRÉ-FLOP</button>
        <button onclick="goToStreet('FLOP')">FLOP</button>
        <button onclick="goToStreet('TURN')">TURN</button>
        <button onclick="goToStreet('RIVER')">RIVER</button>
    </div>

    <div class="main-nav">
        <button id="prev" onclick="move(-1)">⬅ PRÉCÉDENT</button>
        <button id="next" onclick="move(1)">SUIVANT ➡</button>
    </div>

    <div class="log" id="log">Début de la main...</div>

    <script>
        const hand = {
            hero: ["K♣", "J♥"],
            vilain: ["K♠", "Q♣"],
            boardCards: ["K♥", "9♦", "7♣", "4♥", "6♠"],
            actions: [
                { id: 'BLINDS', pot: "1.0", log: "Vilain (SB) pose sa petite blinde (0.5bb). Hero est en BB (1bb).", sbBet: "", bbBet: "", sbStack: "121.5", bbStack: "99", cards: 0, active: '' },
                { id: 'LIMP', pot: "2.0", log: "Vilain (SB) décide de simplement limper à 1bb. UTG, MP, CO, BTN ont fold pré-flop.", sbBet: "1.0", bbBet: "", sbStack: "121", bbStack: "99", cards: 0, active: 'sb' },
                { id: 'PRE', pot: "2.0", log: "Hero (BB) isole le limp en relançant à 4bb avec KcJh.", sbBet: "1.0", bbBet: "4.0", sbStack: "121", bbStack: "96", cards: 0, active: 'bb' },
                { id: 'PRE_CALL', pot: "8.0", log: "Vilain (SB) paye la relance de 4bb.", sbBet: "Call", bbBet: "", sbStack: "118", bbStack: "96", cards: 0, active: 'sb' },
                { id: 'FLOP', pot: "8.0", log: "Flop: Kh 9d 7c. Vilain Check sa top paire.", sbBet: "Check", bbBet: "", sbStack: "118", bbStack: "96", cards: 3, active: 'sb' },
                { id: 'FLOP_BET', pot: "8.0", log: "Hero effectue un c-bet de 3.7bb avec sa top paire.", sbBet: "", bbBet: "3.7", sbStack: "118", bbStack: "92.3", cards: 3, active: 'bb' },
                { id: 'FLOP_CALL', pot: "15.4", log: "Vilain paye instantanément.", sbBet: "Call", bbBet: "", sbStack: "114.3", bbStack: "92.3", cards: 3, active: 'sb' },
                { id: 'TURN', pot: "15.4", log: "Turn: 4h (Brique). Vilain Check à nouveau.", sbBet: "Check", bbBet: "", sbStack: "114.3", bbStack: "92.3", cards: 4, active: 'sb' },
                { id: 'TURN_BET', pot: "15.4", log: "Hero insiste en misant un bon sizing de 15bb pour value.", sbBet: "", bbBet: "15.0", sbStack: "114.3", bbStack: "77.3", cards: 4, active: 'bb' },
                { id: 'TURN_CALL', pot: "45.4", log: "Vilain call passivement une deuxième fois.", sbBet: "Call", bbBet: "", sbStack: "99.3", bbStack: "77.3", cards: 4, active: 'sb' },
                { id: 'RIVER', pot: "45.4", log: "River: 6s. Pas de tirage rentré. Vilain Check.", sbBet: "Check", bbBet: "", sbStack: "99.3", bbStack: "77.3", cards: 5, active: 'sb' },
                { id: 'RIVER_BET', pot: "45.4", log: "Hero tente un bet de thin value à 18.9bb.", sbBet: "", bbBet: "18.9", sbStack: "99.3", bbStack: "58.4", cards: 5, active: 'bb' },
                { id: 'RIVER_CALL', pot: "83.2", log: "Vilain paye. Il retourne KsQc. Dominé au kicker, Hero perd ce pot de 83.2bb.", sbBet: "K♠ Q♣", bbBet: "Call", sbStack: "118.2", bbStack: "58.4", cards: 5, active: 'sb' }
            ]
        };

        let step = 0;

        function getSuitClass(c) {
            if (c.includes('♣')) return 'c'; if (c.includes('♦')) return 'd';
            if (c.includes('♥')) return 'h'; if (c.includes('♠')) return 's';
            return '';
        }

        function render() {
            const s = hand.actions[step];
            document.getElementById('pot').innerText = s.pot;
            document.getElementById('log').innerText = s.log;

            // Gestion dynamique et précise des blindes/tapis
            document.getElementById('stack-sb').innerText = s.sbStack + " bb";
            document.getElementById('stack-bb').innerText = s.bbStack + " bb";

            for(let i=0; i<5; i++) {
                const b = document.getElementById('b'+i);
                b.innerText = hand.boardCards[i];
                b.className = `card ${getSuitClass(hand.boardCards[i])} ${i < s.cards ? 'visible' : ''}`;
            }

            const bSb = document.getElementById('bet-sb'); bSb.innerText = s.sbBet; bSb.style.display = s.sbBet ? 'block' : 'none';
            const bBb = document.getElementById('bet-bb'); bBb.innerText = s.bbBet; bBb.style.display = s.bbBet ? 'block' : 'none';

            document.getElementById('player-sb').classList.toggle('active-turn', s.active === 'sb');
            document.getElementById('player-bb').classList.toggle('active-turn', s.active === 'bb');
            document.getElementById('hero-cards').innerHTML = hand.hero.map(c => `<div class="small-card ${getSuitClass(c)}">${c}</div>`).join('');

            document.getElementById('prev').disabled = step === 0;
            document.getElementById('next').disabled = step === hand.actions.length - 1;
        }

        function move(dir) { step += dir; render(); }
        function goToStreet(id) { step = hand.actions.findIndex(a => a.id === id); render(); }

        render();
    </script>
</body>
</html>
