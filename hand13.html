<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Replayer Poker - Action par Action (Hero CO)</title>
    <style>
        :root { 
            --bg: #111111; 
            --table-border: #DB0007; 
            --table-felt: #1b4d22;  
            --accent-gold: #EFD18F; 
            --white: #FFFFFF;
            --player-bg: #1a1a1a;
        }
        
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px 0;
            background-image: radial-gradient(circle, #222 10%, #0a0a0a 90%);
        }
        
        .table-area { 
            background: var(--table-felt); 
            width: 820px; 
            height: 460px; 
            border-radius: 220px; 
            border: 14px solid var(--table-border); 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 120px rgba(0,0,0,0.7); 
            margin-bottom: 25px;
        }

        .table-inscription {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            font-family: 'Georgia', serif;
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
        }
        
        .pot-display { 
            background: #000000; 
            padding: 8px 30px; 
            border-radius: 4px; 
            color: var(--white); 
            font-weight: 800; 
            position: absolute; 
            top: 24%; 
            left: 50%; 
            transform: translateX(-50%); 
            border: 2px solid var(--accent-gold); 
            z-index: 10;
        }

        /* Joueurs à table */
        .player { 
            position: absolute; 
            width: 110px; 
            text-align: center; 
            background: var(--player-bg); 
            padding: 8px 6px; 
            border-radius: 6px; 
            border-left: 5px solid var(--table-border);
            border-right: 1px solid #444;
            border-top: 1px solid #444;
            border-bottom: 1px solid #444;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            z-index: 8;
        }
        .player.active-turn { 
            border-color: var(--accent-gold); 
            box-shadow: 0 0 20px rgba(239, 209, 143, 0.6); 
        }
        .player.folded { opacity: 0.3; }
        .player-name { font-size: 0.72rem; font-weight: 800; color: var(--white); text-transform: uppercase; }
        .player-stack { font-size: 0.82rem; color: var(--accent-gold); font-weight: bold; margin-top: 3px; }

        .dealer-btn {
            background: white;
            color: black;
            font-size: 0.62rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 50%;
            position: absolute;
            bottom: -5px;
            right: -5px;
            border: 1px solid black;
        }
        
        /* Rotation des 6 positions : HERO (CO) au Centre Bas */
        .pos-utg { top: 40px; left: 25%; transform: translateX(-50%); }
        .pos-hj  { top: -20px; left: 50%; transform: translateX(-50%); }
        .pos-sb  { top: 40px; left: 75%; transform: translateX(-50%); } /* Vilain (SB) */
        .pos-bb  { bottom: 40px; left: 75%; transform: translateX(-50%); }
        .pos-co  { bottom: -20px; left: 50%; transform: translateX(-50%); } /* HERO au Centre Bas */
        .pos-btn { bottom: 40px; left: 25%; transform: translateX(-50%); }

        .board { position: absolute; top: 54%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 8px; z-index: 5; }
        .card { width: 48px; height: 70px; background: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.3rem; color: #111; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .card.visible { display: flex; }
        
        .player-cards { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
        .small-card { width: 24px; height: 34px; background: white; border-radius: 3px; font-size: 0.75rem; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Couleurs Enseignes */
        .c { color: #27ae60; } .d { color: #2980b9; } .h { color: var(--table-border); } .s { color: #111; }

        /* Mises / Jetons sur le tapis */
        .bet { position: absolute; background: rgba(0,0,0,0.9); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--accent-gold); display: none; color: white; font-weight: bold; z-index: 9; }
        .bet.status-check { background: rgba(30, 30, 30, 0.9); border-color: #777; color: #ccc; }
        .bet.status-fold { background: rgba(20, 20, 20, 0.9); border-color: var(--table-border); color: #666; }

        .bpos-utg { top: 110px; left: 29%; transform: translateX(-50%); }
        .bpos-hj  { top: 55px; left: 50%; transform: translateX(-50%); }
        .bpos-sb  { top: 110px; left: 71%; transform: translateX(-50%); }
        .bpos-bb  { bottom: 110px; left: 71%; transform: translateX(-50%); }
        .bpos-co  { bottom: 55px; left: 50%; transform: translateX(-50%); }
        .bpos-btn { bottom: 110px; left: 29%; transform: translateX(-50%); }
        
        .street-nav { display: flex; gap: 6px; margin-bottom: 15px; }
        .street-nav button { background: #1c1c1c; font-size: 0.7rem; padding: 6px 14px; border: 1px solid #333; color: #aaa; cursor: pointer; border-radius: 3px; }
        .street-nav button:hover { background: var(--table-border); color: white; }

        .main-nav { display: flex; gap: 20px; margin-bottom: 25px; }
        .btn-nav { background: var(--table-border); color: var(--white); border: 2px solid var(--table-border); padding: 12px 35px; border-radius: 4px; cursor: pointer; font-weight: 800; letter-spacing: 1px; }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Fenêtre focus d'action unique */
        .log-container { 
            width: 640px; 
            background: #151515; 
            padding: 20px; 
            border-radius: 4px; 
            border-top: 4px solid var(--table-border); 
            border-bottom: 4px solid var(--accent-gold); 
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .log-line { padding: 10px 0; color: var(--white); font-weight: bold; font-size: 1.1rem; }
        .log-street-header { color: var(--accent-gold); font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="table-area">
        <div class="table-inscription">6-Max Arena</div>
        <div class="pot-display">POT: <span id="pot">0</span> bb</div>
        
        <div class="board">
            <div id="b0" class="card"></div><div id="b1" class="card"></div><div id="b2" class="card"></div>
            <div id="b3" class="card"></div><div id="b4" class="card"></div>
        </div>

        <!-- Les 6 sièges orientés autour du CO -->
        <div class="player pos-utg" id="player-utg">
            <div class="player-name">UTG</div>
            <div class="player-stack" id="stack-utg">100 bb</div>
        </div>
        <div class="player pos-hj" id="player-hj">
            <div class="player-name">HJ</div>
            <div class="player-stack" id="stack-hj">100 bb</div>
        </div>
        <div class="player pos-sb" id="player-sb">
            <div class="player-name">Vilain (SB)</div>
            <div class="player-stack" id="stack-sb">100 bb</div>
            <div class="player-cards" id="cards-sb"></div>
        </div>
        <div class="player pos-bb" id="player-bb">
            <div class="player-name">BB</div>
            <div class="player-stack" id="stack-bb">100 bb</div>
        </div>
        <div class="player pos-co" id="player-co">
            <div class="player-name">Hero (CO)</div>
            <div class="player-stack" id="stack-co">108 bb</div>
            <div class="player-cards" id="cards-co"></div>
        </div>
        <div class="player pos-btn" id="player-btn">
            <div class="player-name">BTN</div>
            <div class="player-stack" id="stack-btn">100 bb</div>
            <div class="dealer-btn">D</div>
        </div>

        <!-- Zones de Bet -->
        <div class="bet bpos-utg" id="bet-utg"></div>
        <div class="bet bpos-hj" id="bet-hj"></div>
        <div class="bet bpos-sb" id="bet-sb"></div>
        <div class="bet bpos-bb" id="bet-bb"></div>
        <div class="bet bpos-co" id="bet-co"></div>
        <div class="bet bpos-btn" id="bet-btn"></div>
    </div>

    <div class="street-nav">
        <button onclick="goToStreet(0)">BLINDS</button>
        <button onclick="goToStreet(2)">PRE-FLOP</button>
        <button onclick="goToStreet(5)">FLOP</button>
        <button onclick="goToStreet(8)">TURN</button>
        <button onclick="goToStreet(11)">RIVER</button>
    </div>

    <div class="main-nav">
        <button id="prev" class="btn-nav" onclick="move(-1)">⬅ PRÉCÉDENT</button>
        <button id="next" class="btn-nav" onclick="move(1)">SUIVANT ➡</button>
    </div>

    <div class="log-container">
        <div class="log-street-header" id="log-header">---</div>
        <div class="log-line" id="log-text">---</div>
    </div>

    <script>
        const heroHand = ["A♠", "Q♥"];
        const villainHand = ["Q♦", "T♦"];
        const boardCards = ["6♠", "9♦", "2♣", "3♦", "T♠"];

        const actions = [
            { header: 'Blinds', pot: "1.5", log: "Blinds : Vilain pose sa SB (0.5bb), la BB pose 1bb.", bets: { sb: "0.5 bb", bb: "1.0 bb" }, stacks: { utg: "100", hj: "100", sb: "99.5", bb: "99", co: "108", btn: "100" }, cards: 0, active: '', folds: [], showVillain: false },
            { header: 'Pré-Flop', pot: "1.5", log: "Les joueurs UTG et High-Jack abandonnent leur main (Fold).", bets: { sb: "0.5 bb", bb: "1.0 bb" }, stacks: { sb: "99.5", bb: "99", co: "108" }, cards: 0, active: 'hj', folds: ['utg', 'hj'], showVillain: false },
            { header: 'Pré-Flop', pot: "1.5", log: "Hero au Cut-Off (CO) découvre A♠Q♥ et ouvre la table à 3bb.", bets: { sb: "0.5 bb", bb: "1.0 bb", co: "3.0 bb" }, stacks: { sb: "99.5", bb: "99", co: "105" }, cards: 0, active: 'co', folds: ['utg', 'hj'], showVillain: false },
            { header: 'Pré-Flop', pot: "4.5", log: "Le Bouton (BTN) jette ses cartes à son tour.", bets: { sb: "0.5 bb", bb: "1.0 bb", co: "3.0 bb" }, stacks: { sb: "99.5", bb: "99", co: "105" }, cards: 0, active: 'btn', folds: ['utg', 'hj', 'btn'], showVillain: false },
            { header: 'Pré-Flop', pot: "4.5", log: "Vilain en Petite Blind (SB) décide de payer (Call) les 3bb. La BB fold.", bets: { sb: "3.0 bb", co: "3.0 bb", bb: "Fold" }, stacks: { sb: "97", bb: "99", co: "105" }, cards: 0, active: 'sb', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            
            { header: 'Flop', pot: "7.0", log: "Le flop donne 6♠ 9♦ 2♣. Vilain (SB) check face à l'agresseur.", bets: { sb: "Check" }, stacks: { sb: "97", co: "105" }, cards: 3, active: 'sb', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            { header: 'Flop', pot: "7.0", log: "Hero en profite pour envoyer un C-bet classique de 2.3bb.", bets: { sb: "Check", co: "2.3 bb" }, stacks: { sb: "97", co: "102.7" }, cards: 3, active: 'co', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            { header: 'Flop', pot: "11.6", log: "Vilain (SB) paye la mise de continuation. Le pot fait 11.6bb.", bets: { sb: "Call 2.3bb", co: "2.3 bb" }, stacks: { sb: "94.7", co: "102.7" }, cards: 3, active: 'sb', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            
            { header: 'Turn', pot: "11.6", log: "La turn est un 3♦ apportant des tirages. Vilain check une nouvelle fois.", bets: { sb: "Check" }, stacks: { sb: "94.7", co: "102.7" }, cards: 4, active: 'sb', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            { header: 'Turn', pot: "11.6", log: "Hero maintient la pression (2nd barrel) et mise 4.3bb.", bets: { sb: "Check", co: "4.3 bb" }, stacks: { sb: "94.7", co: "98.4" }, cards: 4, active: 'co', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            { header: 'Turn', pot: "20.2", log: "Vilain (SB) s'accroche et paye les 4.3bb avec ses tirages.", bets: { sb: "Call 4.3bb", co: "4.3 bb" }, stacks: { sb: "90.4", co: "98.4" }, cards: 4, active: 'sb', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            
            { header: 'River', pot: "20.2", log: "La river est un T♠. Vilain check pour la troisième fois.", bets: { sb: "Check" }, stacks: { sb: "90.4", co: "98.4" }, cards: 5, active: 'sb', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            { header: 'River', pot: "20.2", log: "Hero décide de transformer sa main en bluff total et mise le POT (20.2bb).", bets: { sb: "Check", co: "20.2 bb (Pot)" }, stacks: { sb: "90.4", co: "78.2" }, cards: 5, active: 'co', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            { header: 'River', pot: "60.6", log: "Vilain (SB) trouve un call avec sa paire trouvée sur la River.", bets: { sb: "Call 20.2bb", co: "20.2 bb (Pot)" }, stacks: { sb: "70.2", co: "78.2" }, cards: 5, active: 'sb', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: false },
            { header: 'Abattage', pot: "60.6", log: "Showdown : Vilain retourne Q♦T♦ pour une deuxième paire max kicker. Le bluff de Hero échoue.", bets: {}, stacks: { sb: "70.2", co: "78.2" }, cards: 5, active: '', folds: ['utg', 'hj', 'btn', 'bb'], showVillain: true }
        ];

        let step = 0;
        const seats = ['utg', 'hj', 'sb', 'bb', 'co', 'btn'];

        function getSuitClass(cardStr) {
            if (cardStr.includes('♣') || cardStr.includes('c')) return 'c'; 
            if (cardStr.includes('♦') || cardStr.includes('d')) return 'd';
            if (cardStr.includes('♥') || cardStr.includes('h')) return 'h'; 
            if (cardStr.includes('♠') || cardStr.includes('s')) return 's';
            return '';
        }

        function cleanCardSymbol(cardStr) {
            return cardStr.replace('c','♣').replace('h','♥').replace('s','♠').replace('d','♦');
        }

        function render() {
            const act = actions[step];
            document.getElementById('pot').innerText = act.pot;

            document.getElementById('log-header').innerText = `--- ${act.header} ---`;
            document.getElementById('log-text').innerText = act.log;

            seats.forEach(id => {
                const pEl = document.getElementById(`player-${id}`);
                const bEl = document.getElementById(`bet-${id}`);
                
                if (act.stacks && act.stacks[id]) {
                    document.getElementById(`stack-${id}`).innerText = act.stacks[id] + " bb";
                }

                pEl.classList.toggle('folded', act.folds.includes(id));
                pEl.classList.toggle('active-turn', act.active === id);

                const val = (act.bets && act.bets[id]) ? act.bets[id] : "";
                if (val) {
                    bEl.innerText = val;
                    bEl.style.display = "block";
                    bEl.className = `bet bpos-${id}`;
                    if(val.includes("Check")) bEl.classList.add('status-check');
                    if(val.includes("Fold")) bEl.classList.add('status-fold');
                } else {
                    bEl.style.display = "none";
                }

                // Distribution des cartes privées
                const cardBox = document.getElementById(`cards-${id}`);
                if (cardBox) {
                    cardBox.innerHTML = '';
                    if (id === 'co') {
                        cardBox.innerHTML = heroHand.map(c => `<div class="small-card ${getSuitClass(c)}">${cleanCardSymbol(c)}</div>`).join('');
                    } else if (id === 'sb' && act.showVillain) {
                        cardBox.innerHTML = villainHand.map(c => `<div class="small-card ${getSuitClass(c)}">${cleanCardSymbol(c)}</div>`).join('');
                    }
                }
            });

            // Mise à jour du Board
            for (let i = 0; i < 5; i++) {
                const b = document.getElementById('b' + i);
                if (i < act.cards) {
                    b.innerText = cleanCardSymbol(boardCards[i]);
                    b.className = `card ${getSuitClass(boardCards[i])} visible`;
                } else {
                    b.className = `card`;
                }
            }

            document.getElementById('prev').disabled = (step === 0);
            document.getElementById('next').disabled = (step === actions.length - 1);
        }

        function move(dir) {
            if (step + dir >= 0 && step + dir < actions.length) {
                step += dir;
                render();
            }
        }

        function goToStreet(index) {
            step = index;
            render();
        }

        render();
    </script>
</body>
</html>
