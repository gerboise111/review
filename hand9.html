<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Replayer Poker - Main Spécifique</title>
    <style>
        :root { 
            --bg: #111111; 
            --table-border: #DB0007; 
            --table-felt: #1b4d22;  
            --accent-gold: #EFD18F; 
            --white: #FFFFFF;
            --player-bg: #1a1a1a;
        }
        
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px 0;
            background-image: radial-gradient(circle, #222 10%, #0a0a0a 90%);
        }
        
        .table-area { 
            background: var(--table-felt); 
            width: 780px; 
            height: 420px; 
            border-radius: 200px; 
            border: 14px solid var(--table-border); 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 120px rgba(0,0,0,0.7); 
            margin-bottom: 25px;
        }

        .table-inscription {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            font-family: 'Georgia', serif;
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }
        
        .pot-display { 
            background: #000000; 
            padding: 8px 30px; 
            border-radius: 4px; 
            color: var(--white); 
            font-weight: 800; 
            position: absolute; 
            top: 24%; 
            left: 50%; 
            transform: translateX(-50%); 
            border: 2px solid var(--accent-gold); 
            z-index: 10;
        }

        .player { 
            position: absolute; 
            width: 115px; 
            text-align: center; 
            background: var(--player-bg); 
            padding: 10px 6px; 
            border-radius: 6px; 
            border-left: 5px solid var(--table-border);
            border-right: 1px solid #444;
            border-top: 1px solid #444;
            border-bottom: 1px solid #444;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            z-index: 8;
        }
        .player.active-turn { 
            border-color: var(--accent-gold); 
            box-shadow: 0 0 20px rgba(239, 209, 143, 0.6); 
        }
        .player.folded { opacity: 0.3; }
        .player-name { font-size: 0.75rem; font-weight: 800; color: var(--white); }
        .player-stack { font-size: 0.85rem; color: var(--accent-gold); font-weight: bold; margin-top: 3px; }

        .dealer-btn {
            background: white;
            color: black;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 50%;
            position: absolute;
            bottom: -5px;
            right: -5px;
        }
        
        /* Positions des 4 joueurs */
        .pos-co  { bottom: -25px; left: 50%; transform: translateX(-50%); } 
        .pos-btn { bottom: 45px; left: 35px; }
        .pos-sb  { top: -25px; left: 33%; transform: translateX(-50%); }
        .pos-bb  { top: -25px; left: 66%; transform: translateX(-50%); }

        .board { position: absolute; top: 54%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 8px; z-index: 5; }
        .card { width: 48px; height: 70px; background: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.3rem; color: #111; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .card.visible { display: flex; }
        
        .player-cards { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
        .small-card { width: 24px; height: 34px; background: white; border-radius: 3px; font-size: 0.75rem; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Couleurs enseignes */
        .c { color: #27ae60; } .d { color: #2980b9; } .h { color: var(--table-border); } .s { color: #111; }

        /* Mises */
        .bet { position: absolute; background: rgba(0,0,0,0.9); padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--accent-gold); display: none; color: white; font-weight: bold; z-index: 9; }
        .bpos-co  { bottom: 55px; left: 50%; transform: translateX(-50%); }
        .bpos-btn { bottom: 105px; left: 110px; }
        .bpos-sb  { top: 65px; left: 35%; transform: translateX(-50%); }
        .bpos-bb  { top: 65px; left: 63%; transform: translateX(-50%); }
        
        .bet.status-check { background: rgba(30, 30, 30, 0.9); border-color: #777; color: #ccc; }

        .street-nav { display: flex; gap: 6px; margin-bottom: 15px; }
        .street-nav button { background: #1c1c1c; font-size: 0.7rem; padding: 6px 14px; border: 1px solid #333; color: #aaa; cursor: pointer; border-radius: 3px; }
        .street-nav button:hover { background: var(--table-border); color: white; }

        .main-nav { display: flex; gap: 20px; margin-bottom: 25px; }
        .btn-nav { background: var(--table-border); color: var(--white); border: 2px solid var(--table-border); padding: 12px 35px; border-radius: 4px; cursor: pointer; font-weight: 800; letter-spacing: 1px; }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .log-container { 
            width: 600px; 
            background: #151515; 
            padding: 22px; 
            border-radius: 4px; 
            border-top: 4px solid var(--table-border); 
            border-bottom: 4px solid var(--accent-gold); 
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }
        .log-line { padding: 4px 0; color: #777; font-size: 0.95rem; }
        .log-line.active-log { color: var(--white); font-weight: bold; border-left: 3px solid var(--accent-gold); padding-left: 6px; }
        .log-street-header { color: var(--accent-gold); font-weight: 800; font-size: 0.8rem; margin-top: 6px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="table-area">
        <div class="table-inscription">Arsenal FC</div>
        <div class="pot-display">POT: <span id="pot">0</span> bb</div>
        
        <div class="board">
            <div id="b0" class="card"></div><div id="b1" class="card"></div><div id="b2" class="card"></div>
            <div id="b3" class="card"></div><div id="b4" class="card"></div>
        </div>

        <!-- Structure HTML fixe des 4 joueurs -->
        <div class="player pos-co" id="player-co">
            <div class="player-name">HERO (CO)</div>
            <div class="player-stack" id="stack-co">280 bb</div>
            <div class="player-cards" id="cards-co"></div>
        </div>
        <div class="player pos-btn" id="player-btn">
            <div class="player-name">BTN</div>
            <div class="player-stack" id="stack-btn">100 bb</div>
            <div class="dealer-btn">D</div>
        </div>
        <div class="player pos-sb" id="player-sb">
            <div class="player-name">SB</div>
            <div class="player-stack" id="stack-sb">100 bb</div>
        </div>
        <div class="player pos-bb" id="player-bb">
            <div class="player-name">VILAIN (BB)</div>
            <div class="player-stack" id="stack-bb">282 bb</div>
            <div class="player-cards" id="cards-bb"></div>
        </div>

        <div class="bet bpos-co" id="bet-co"></div>
        <div class="bet bpos-btn" id="bet-btn"></div>
        <div class="bet bpos-sb" id="bet-sb"></div>
        <div class="bet bpos-bb" id="bet-bb"></div>
    </div>

    <div class="street-nav">
        <button onclick="goToStreet(0)">BLINDS</button>
        <button onclick="goToStreet(1)">PRÉ-FLOP</button>
        <button onclick="goToStreet(4)">FLOP</button>
        <button onclick="goToStreet(6)">TURN</button>
        <button onclick="goToStreet(8)">RIVER</button>
    </div>

    <div class="main-nav">
        <button id="prev" class="btn-nav" onclick="move(-1)">⬅ PRÉCÉDENT</button>
        <button id="next" class="btn-nav" onclick="move(1)">SUIVANT ➡</button>
    </div>

    <div class="log-container" id="log-container"></div>

    <script>
        const heroHand = ["Q♠", "7♠"];
        const villainHand = ["A♥", "J♦"];
        const boardCards = ["A♠", "2♠", "8♦", "J♣", "3♦"];

        const actions = [
            { header: 'Blinds', pot: "1.5", log: "Blinds posées : SB pose 0.5bb, Vilain (BB) pose 1bb.", bets: { sb: "0.5 bb", bb: "1.0 bb" }, stacks: { co: "280", btn: "100", sb: "99.5", bb: "281" }, cards: 0, active: '', folds: [], showVillain: false },
            { header: 'Pré-Flop', pot: "1.5", log: "Hero open au Cut-off (CO) à 2.5bb avec Q♠7♠.", bets: { sb: "0.5 bb", bb: "1.0 bb", co: "2.5 bb" }, stacks: { co: "277.5", btn: "100", sb: "99.5", bb: "281" }, cards: 0, active: 'co', folds: [], showVillain: false },
            { header: '', pot: "4.0", log: "Le Bouton et la Petite blind passent.", bets: { bb: "1.0 bb", co: "2.5 bb" }, stacks: { co: "277.5", btn: "100", sb: "99.5", bb: "281" }, cards: 0, active: '', folds: ['sb', 'btn'], showVillain: false },
            { header: '', pot: "5.5", log: "Vilain (BB) défend et complète à 2.5bb.", bets: { bb: "2.5 bb", co: "2.5 bb" }, stacks: { co: "277.5", btn: "100", sb: "99.5", bb: "279.5" }, cards: 0, active: 'bb', folds: ['sb', 'btn'], showVillain: false },
            
            { header: 'Flop', pot: "5.5", log: "Flop : A♠ 2♠ 8♦. Vilain check.", bets: { bb: "Check" }, stacks: { co: "277.5", btn: "100", sb: "99.5", bb: "279.5" }, cards: 3, active: 'bb', folds: ['sb', 'btn'], showVillain: false },
            { header: '', pot: "5.5", log: "Hero check back son tirage couleur flush draw max.", bets: { bb: "Check", co: "Check" }, stacks: { co: "277.5", btn: "100", sb: "99.5", bb: "279.5" }, cards: 3, active: 'co', folds: ['sb', 'btn'], showVillain: false },
            
            { header: 'Turn', pot: "5.5", log: "Turn : J♣. Vilain mise 3.4bb.", bets: { bb: "3.4 bb" }, stacks: { co: "277.5", btn: "100", sb: "99.5", bb: "276.1" }, cards: 4, active: 'bb', folds: ['sb', 'btn'], showVillain: false },
            { header: '', pot: "12.3", log: "Hero call avec son tirage couleur.", bets: { bb: "3.4 bb", co: "3.4 bb" }, stacks: { co: "274.1", btn: "100", sb: "99.5", bb: "276.1" }, cards: 4, active: 'co', folds: ['sb', 'btn'], showVillain: false },
            
            { header: 'River', pot: "12.3", log: "River : 3♦. Vilain check.", bets: { bb: "Check" }, stacks: { co: "274.1", btn: "100", sb: "99.5", bb: "276.1" }, cards: 5, active: 'bb', folds: ['sb', 'btn'], showVillain: false },
            { header: '', pot: "12.3", log: "Hero check back également.", bets: { bb: "Check", co: "Check" }, stacks: { co: "274.1", btn: "100", sb: "99.5", bb: "276.1" }, cards: 5, active: 'co', folds: ['sb', 'btn'], showVillain: false },
            { header: 'Showdown', pot: "12.3", log: "Abattage : Vilain montre AhJd (Double Paire As et Valets) et gagne le pot.", bets: {}, stacks: { co: "274.1", btn: "100", sb: "99.5", bb: "288.4" }, cards: 5, active: '', folds: ['sb', 'btn'], showVillain: true }
        ];

        let step = 0;
        const seats = ['co', 'btn', 'sb', 'bb'];

        function getSuit(cardStr) {
            if (cardStr.includes('♣')) return 'c'; if (cardStr.includes('♦')) return 'd';
            if (cardStr.includes('♥')) return 'h'; if (cardStr.includes('♠')) return 's';
            return '';
        }

        function render() {
            const act = actions[step];
            document.getElementById('pot').innerText = act.pot;

            seats.forEach(id => {
                const pEl = document.getElementById(`player-${id}`);
                const bEl = document.getElementById(`bet-${id}`);
                
                // Stacks
                if (act.stacks && act.stacks[id]) {
                    document.getElementById(`stack-${id}`).innerText = act.stacks[id] + " bb";
                }

                // Folds & Actifs
                pEl.classList.toggle('folded', act.folds.includes(id));
                pEl.classList.toggle('active-turn', act.active === id);

                // Jetons / Mises sur la table
                const val = (act.bets && act.bets[id]) ? act.bets[id] : "";
                if (val) {
                    bEl.innerText = val;
                    bEl.style.display = "block";
                    bEl.classList.toggle('status-check', val.includes("Check"));
                } else {
                    bEl.style.display = "none";
                }

                // Cartes de Hero et Vilain
                const cardBox = document.getElementById(`cards-${id}`);
                if (cardBox) {
                    cardBox.innerHTML = '';
                    if (id === 'co') {
                        cardBox.innerHTML = heroHand.map(c => `<div class="small-card ${getSuit(c)}">${c}</div>`).join('');
                    } else if (id === 'bb' && act.showVillain) {
                        cardBox.innerHTML = villainHand.map(c => `<div class="small-card ${getSuit(c)}">${c}</div>`).join('');
                    }
                }
            });

            // Board public
            for (let i = 0; i < 5; i++) {
                const b = document.getElementById('b' + i);
                if (i < act.cards) {
                    b.innerText = boardCards[i];
                    b.className = `card ${getSuit(boardCards[i])} visible`;
                } else {
                    b.className = `card`;
                }
            }

            // Journal textuel historique
            let logHTML = "";
            for (let i = 0; i <= step; i++) {
                if (actions[i].header) {
                    logHTML += `<div class="log-street-header">--- ${actions[i].header} ---</div>`;
                }
                const activeStyle = (i === step) ? 'active-log' : '';
                logHTML += `<div class="log-line ${activeStyle}">${actions[i].log}</div>`;
            }
            const logBox = document.getElementById('log-container');
            logBox.innerHTML = logHTML;
            logBox.scrollTop = logBox.scrollHeight;

            document.getElementById('prev').disabled = (step === 0);
            document.getElementById('next').disabled = (step === actions.length - 1);
        }

        function move(dir) {
            step += dir;
            render();
        }

        function goToStreet(index) {
            step = index;
            render();
        }

        render();
    </script>
</body>
</html>
